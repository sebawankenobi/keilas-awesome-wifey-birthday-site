<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* SPLASH */
#splashScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
}

/* MAIN */
#mainContent { display: none; }

.container { padding: 60px 20px; }

button {
    background-color: #ffb703;
    color: #240046;
    border: none;
    padding: 15px 25px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Comic Sans MS', cursive;
    font-size: 1rem;
    transition: 0.2s ease;
}
button:hover { transform: scale(1.05); }

/* GALLERY */
.gallery {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    opacity: 0;
    transition: opacity 2s ease;
}

.photo {
    width: clamp(140px, 35vw, 240px);
    height: clamp(140px, 35vw, 240px);
    object-fit: cover;
    border-radius: 20px;
    cursor: pointer;
}
.photo:hover { transform: scale(1.05); }

/* LIGHTBOX */
#lightbox {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

#lightbox::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    background-size: cover;
    background-position: center;
    filter: blur(25px) brightness(0.4);
    z-index: -1;
}

#lightboxContent {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#lightbox img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 15px;
}

#lightboxCaption {
    margin-top: 15px;
    max-width: 80%;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
}

.navBtn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2rem;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 10px;
    cursor: pointer;
}

#prevBtn { left: 20px; }
#nextBtn { right: 20px; }

/* FINAL */
#finalScreen {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(10,0,20,0.95);
    display: none;
    justify-content: center;
    align-items: center;
}

#finalContent {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#backBtn { margin-top: 40px; }

.cursor { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>

<body>

<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<div id="mainContent">
<div class="container">

<h1>Down the Rabbit Hole 🐇</h1>
<h2>It’s Your Birthday 💜</h2>

<button onclick="reveal()">Do NOT Click This 👀</button>

<div class="gallery" id="gallery"></div>

<button onclick="startFinal()">One Last Thing 💜</button>

</div>
</div>

<div id="lightbox">
<button id="prevBtn" class="navBtn" onclick="prevImage(event)">❮</button>
<div id="lightboxContent">
<img id="lightboxImg">
<div id="lightboxCaption"></div>
</div>
<button id="nextBtn" class="navBtn" onclick="nextImage(event)">❯</button>
</div>

<div id="finalScreen" onclick="closeFinal(event)">
<div id="finalContent">
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<audio id="bgMusic" src="audio/song.mp3"></audio>

<script>

function startExperience(){
    document.getElementById("splashScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
}

const images = [
"images/20190801_163558.jpg",
"images/20190823_171856.jpg",
"images/20200912_201834.jpg",
"images/20230409_090603.jpg",
"images/20230423_144323.jpg",
"images/FB_IMG_1557711830326.jpg",
"images/FB_IMG_1566611458309.jpg",
"images/FB_IMG_1587683608211.jpg",
"images/FB_IMG_1776693720360.jpg",
"images/FB_IMG_1776885598001.jpg",
"images/FB_IMG_1776885609789.jpg",
"images/FB_IMG_1776885622286.jpg",
"images/FB_IMG_1776885629939.jpg",
"images/FB_IMG_1776885639302.jpg",
"images/IMG-20191223-WA0015.jpg",
"images/IMG-20210325-WA0000.jpg",
"images/IMG-20210423-WA0001.jpg",
"images/IMG-20210423-WA0018.jpg",
"images/IMG-20210423-WA0020.jpg",
"images/IMG-20210423-WA0037.jpg",
"images/IMG-20210423-WA0038.jpg",
"images/IMG-20230906-WA0000.jpg",
"images/IMG-20251122-WA0003.jpg",
"images/IMG-20251122-WA0004.jpg",
"images/IMG_20230920_103736_268.jpg"
];

const memories = images.map((_, i) => `Memory ${i+1} 💜`);

let currentIndex = 0;

const gallery = document.getElementById("gallery");
images.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;
    img.className="photo";
    img.onclick=()=>openLightbox(i);
    gallery.appendChild(img);
});

function reveal(){
    document.querySelector(".gallery").style.opacity="1";
    const music=document.getElementById("bgMusic");
    music.currentTime=15;
    music.play().catch(()=>{});
}

function openLightbox(i){
    currentIndex=i;
    document.getElementById("lightbox").style.display="flex";
    updateLightbox();
}

function updateLightbox(){
    document.getElementById("lightboxImg").src=images[currentIndex];
    document.getElementById("lightboxCaption").innerHTML=memories[currentIndex];
    document.getElementById("lightbox").style.backgroundImage=`url(${images[currentIndex]})`;
}

function nextImage(e){
    e.stopPropagation();
    currentIndex=(currentIndex+1)%images.length;
    updateLightbox();
}

function prevImage(e){
    e.stopPropagation();
    currentIndex=(currentIndex-1+images.length)%images.length;
    updateLightbox();
}

document.getElementById("lightbox").onclick=()=>{
    document.getElementById("lightbox").style.display="none";
};

function startFinal(){
    document.getElementById("finalScreen").style.display="flex";

    const text="Out of all the strange, random, beautiful things...\n\nI’m just really glad I found you 💜";
    const el=document.getElementById("typewriter");

    el.innerHTML="";
    let i=0;

    function type(){
        if(i<text.length){
            el.innerHTML+=text[i]==="\n"?"<br>":text[i];
            i++;
            setTimeout(type,40);
        }
    }

    type();
}

function closeFinal(e){
    e.stopPropagation();
    document.getElementById("finalScreen").style.display="none";
}

</script>

</body>
</html>
