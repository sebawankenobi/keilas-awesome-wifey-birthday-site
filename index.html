<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    color: white;
    text-align: center;
    font-size: 18px;
}

/* SPLASH */
#splashScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
}

#mainContent { display: none; }

.container { padding: 60px 20px; }

h1 { font-size: 2rem; }
h2 { font-size: 1.5rem; }

/* BUTTON */
button {
    background-color: #ffb703;
    color: #240046;
    border: none;
    padding: 16px 28px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 1rem;
}

/* SLIDESHOW */
#slideshow {
    display: none;
    margin-top: 40px;
    cursor: pointer;
}

.slide img {
    max-width: 92%;
    max-height: 65vh;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 1s ease;
}

.slide.show img { opacity: 1; }

/* CAPTION (improved readability) */
#caption {
    margin-top: 25px;
    font-size: 1.4rem;
    line-height: 1.6;
    max-width: 85%;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.8s ease;
}

#caption.show {
    opacity: 1;
    transform: translateY(0);
}

/* Tap hint */
#tapHint {
    margin-top: 15px;
    opacity: 0.7;
    font-size: 1rem;
}

/* FINAL BUTTON */
#finalBtn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 2s ease;
    display: none;
}

#finalBtn.show {
    display: block;
    opacity: 1;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(10,0,20,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* FINAL TEXT BIGGER */
#typewriter {
    font-size: 1.6rem;
    line-height: 1.7;
    max-width: 90%;
}

#backBtn { margin-top: 60px; }

</style>
</head>

<body>

<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<div id="mainContent">
<div class="container">

<h1>It’s Time To Go Down The Rabbit Hole! 🐇</h1>
<h2>It’s Your Birthday! 💜</h2>

<button id="startBtn" onclick="handleWarning()">WARNING - DON'T CLICK ON THIS!!</button>

<div id="slideshow" onclick="nextSlide()"></div>
<div id="caption"></div>
<div id="tapHint" style="display:none;">(tap the photo 💜)</div>

</div>
</div>

<button id="finalBtn" onclick="startFinal()">One Last Thing 💜</button>

<div id="finalScreen" onclick="closeFinal(event)">
<div>
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<audio id="bgMusic" src="audio/song.mp3"></audio>

<script>

function startExperience(){
    document.getElementById("splashScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
}

let warningStep = 0;

function handleWarning(){
    const btn = document.getElementById("startBtn");

    warningStep++;

    if(warningStep === 1){
        btn.innerText = "ARE YOU SURE!";
    }
    else if(warningStep === 2){
        btn.innerText = "DON'T SAY I DIDN'T WARN YOU!!!";
    }
    else {
        startSlideshow();
    }
}

const slides = [
{ src: "images_new/1.jpg", text: "It's your birthday, silly!!" },
{ src: "images_new/2.jpg", text: "Did I mention you're silly?!" },
{ src: "images_new/3.jpg", text: "Legend says, that way back..." },
{ src: "images_new/4.jpg", text: "when we were being silly on dates...." },
{ src: "images_new/5.jpg", text: "and smiling...." },
{ src: "images_new/6.jpg", text: "our love bloomed...." },
{ src: "images_new/7.jpg", text: "My heart and soul always knew I wanted to spend the rest of my life with you." },
{ src: "images_new/8.jpg", text: "I admire you." },
{ src: "images_new/9.jpg", text: "With every triumph." },
{ src: "images_new/10.jpg", text: "And every victory." },
{ src: "images_new/11.jpg", text: "Your smile shines with light...." },
{ src: "images_new/12.jpg", text: "With so much happiness...." },
{ src: "images_new/13.jpg", text: "And your silliness, of course!" },
{ src: "images_new/14.jpg", text: "You support us!" },
{ src: "images_new/15.jpg", text: "You're so quirky!!" },
{ src: "images_new/16.jpg", text: "Even if you're blonde..." },
{ src: "images_new/17.jpg", text: "Blonde AND silly!!" },
{ src: "images_new/18.jpg", text: "Time has proven that we're meant for each other." },
{ src: "images_new/19.jpg", text: "You're a beautiful badass...." },
{ src: "images_new/20.jpg", text: "A PROFESSIONAL beautiful, badass!!" },
{ src: "images_new/21.jpg", text: "And I'm so fucking lucky that you're in my life." },
{ src: "images_new/22.jpg", text: "Yes, YOU!" },
{ src: "images_new/23.jpg", text: "*insert laugh track here*" }
];

let currentIndex = 0;
const slideshow = document.getElementById("slideshow");
const caption = document.getElementById("caption");
const finalBtn = document.getElementById("finalBtn");

function startSlideshow(){

    document.getElementById("startBtn").style.display = "none";

    slideshow.style.display = "block";
    document.getElementById("tapHint").style.display = "block";

    const music = document.getElementById("bgMusic");
    try {
        music.currentTime = 15;
        music.play();
    } catch(e){}

    showSlide();
}

function showSlide(){

    const slide = slides[currentIndex];

    slideshow.innerHTML = `
        <div class="slide show">
            <img src="${slide.src}">
        </div>
    `;

    caption.classList.remove("show");
    caption.innerHTML = "";

    setTimeout(() => {
        caption.innerHTML = slide.text;
        caption.classList.add("show");
    }, 600);
}

function nextSlide(){

    currentIndex++;

    if(currentIndex >= slides.length){
        slideshow.style.display = "none";
        caption.style.display = "none";
        document.getElementById("tapHint").style.display = "none";
        finalBtn.classList.add("show");
        return;
    }

    showSlide();
}

function startFinal(){
    document.getElementById("finalScreen").style.display="flex";

    const text = "Out of all the strange, random, beautiful things in the Universe....\n\nI'm just really glad I found you....\n\nHappy Birthday, moon of my life 💜💜💜";

    const el = document.getElementById("typewriter");

    el.innerHTML="";
    let i=0;

    function type(){
        if(i<text.length){
            el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
            i++;
            setTimeout(type,40);
        }
    }

    type();
}

function closeFinal(e){
    e.stopPropagation();
    document.getElementById("finalScreen").style.display="none";
}

</script>

</body>
</html>
