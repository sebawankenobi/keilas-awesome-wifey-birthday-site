<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    color: white;
    text-align: center;
}

/* SPLASH */
#splashScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
}

/* MAIN */
#mainContent { display: none; }

.container { padding: 60px 20px; }

/* BUTTON */
button {
    background-color: #ffb703;
    color: #240046;
    border: none;
    padding: 15px 25px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Comic Sans MS', cursive;
}

/* SLIDESHOW */
#slideshow {
    display: none;
    margin-top: 40px;
    cursor: pointer;
}

.slide img {
    max-width: 90%;
    max-height: 60vh;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 1s ease;
}

.slide.show img {
    opacity: 1;
}

/* Tap hint */
#tapHint {
    margin-top: 15px;
    opacity: 0.6;
    font-size: 0.9rem;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 0.8; }
}

/* FINAL BUTTON */
#finalBtn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 2s ease;
    display: none;
}

#finalBtn.show {
    display: block;
    opacity: 1;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(10,0,20,0.95);
    display: none;
    justify-content: center;
    align-items: center;
}

#backBtn { margin-top: 40px; }

</style>
</head>

<body>

<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<div id="mainContent">
<div class="container">

<h1>Down the Rabbit Hole 🐇</h1>
<h2>It’s Your Birthday 💜</h2>

<button id="startBtn" onclick="startSlideshow()">Do NOT Click This 👀</button>

<div id="slideshow" onclick="nextSlide()"></div>
<div id="tapHint" style="display:none;">(tap the photo 💜)</div>

</div>
</div>

<button id="finalBtn" onclick="startFinal()">One Last Thing 💜</button>

<div id="finalScreen" onclick="closeFinal(event)">
<div>
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<audio id="bgMusic" src="audio/song.mp3"></audio>

<script>

function startExperience(){
    document.getElementById("splashScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
}

const images = [
"images_new/1.jpg",
"images_new/2.jpg",
"images_new/3.jpg",
"images_new/4.jpg",
"images_new/5.jpg",
"images_new/6.jpg",
"images_new/7.jpg",
"images_new/8.jpg",
"images_new/9.jpg",
"images_new/10.jpg",
"images_new/11.jpg",
"images_new/12.jpg",
"images_new/13.jpg",
"images_new/14.jpg",
"images_new/15.jpg",
"images_new/16.jpg",
"images_new/17.jpg",
"images_new/18.jpg",
"images_new/19.jpg",
"images_new/20.jpg",
"images_new/21.jpg",
"images_new/22.jpg",
"images_new/23.jpg"
];

let currentIndex = 0;
const slideshow = document.getElementById("slideshow");
const finalBtn = document.getElementById("finalBtn");

function startSlideshow(){

    document.getElementById("startBtn").style.display = "none";

    slideshow.style.display = "block";
    document.getElementById("tapHint").style.display = "block";

    const music = document.getElementById("bgMusic");
    try {
        music.currentTime = 15;
        music.play();
    } catch(e){}

    showSlide();
}

function showSlide(){
    slideshow.innerHTML = `
        <div class="slide show">
            <img src="${images[currentIndex]}">
        </div>
    `;
}

function nextSlide(){

    currentIndex++;

    if(currentIndex >= images.length){
        slideshow.style.display = "none";
        document.getElementById("tapHint").style.display = "none";
        finalBtn.classList.add("show");
        return;
    }

    showSlide();
}

function startFinal(){
    document.getElementById("finalScreen").style.display="flex";

    const text="Out of all the strange, random, beautiful things...\n\nI’m just really glad I found you 💜";
    const el=document.getElementById("typewriter");

    el.innerHTML="";
    let i=0;

    function type(){
        if(i<text.length){
            el.innerHTML+=text[i]==="\n"?"<br>":text[i];
            i++;
            setTimeout(type,40);
        }
    }

    type();
}

function closeFinal(e){
    e.stopPropagation();
    document.getElementById("finalScreen").style.display="none";
}

</script>

</body>
</html>
