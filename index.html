<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday 💜</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#240046;
    color:white;
    text-align:center;
}

/* SPLASH */
#splashScreen {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}

#mainContent { display:none; }

/* GALLERY */
.gallery {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.photo {
    width:150px;
    height:150px;
    object-fit:cover;
    cursor:pointer;
}

/* LIGHTBOX */
#lightbox {
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:black;
}

#lightbox img {
    max-width:90%;
    max-height:90%;
}

.navBtn {
    position:absolute;
    top:50%;
    font-size:2rem;
    background:none;
    border:none;
    color:white;
}

#prevBtn { left:20px; }
#nextBtn { right:20px; }

/* FINAL */
#finalScreen {
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:black;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<!-- MAIN -->
<div id="mainContent">

<h1>Down the Rabbit Hole 🐇</h1>

<button onclick="reveal()">Do NOT Click This 👀</button>

<div class="gallery" id="gallery"></div>

<button onclick="startFinal()">One Last Thing 💜</button>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<button class="navBtn" id="prevBtn" onclick="prevImage(event)">❮</button>
<img id="lightboxImg">
<button class="navBtn" id="nextBtn" onclick="nextImage(event)">❯</button>
</div>

<!-- FINAL -->
<div id="finalScreen" onclick="closeFinal()">
<h1>Happy Birthday 💜</h1>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="audio/song.mp3"></audio>
<audio id="alertSound" src="audio/alert.mp3"></audio>

<script>

/* IMAGES */
const images = [
"images/20190801_163558.jpg",
"images/20190823_171856.jpg",
"images/20200912_201834.jpg",
"images/20230409_090603.jpg",
"images/20230423_144323.jpg",
"images/FB_IMG_1557711830326.jpg",
"images/FB_IMG_1566611458309.jpg",
"images/FB_IMG_1587683608211.jpg",
"images/FB_IMG_1776693720360.jpg",
"images/FB_IMG_1776885598001.jpg",
"images/FB_IMG_1776885609789.jpg",
"images/FB_IMG_1776885622286.jpg",
"images/FB_IMG_1776885629939.jpg",
"images/FB_IMG_1776885639302.jpg",
"images/IMG-20191223-WA0015.jpg",
"images/IMG-20210325-WA0000.jpg",
"images/IMG-20210423-WA0001.jpg",
"images/IMG-20210423-WA0018.jpg",
"images/IMG-20210423-WA0020.jpg",
"images/IMG-20210423-WA0037.jpg",
"images/IMG-20210423-WA0038.jpg",
"images/IMG-20230906-WA0000.jpg",
"images/IMG-20251122-WA0003.jpg",
"images/IMG-20251122-WA0004.jpg",
"images/IMG_20230920_103736_268.jpg"
];

let currentIndex = 0;

/* BUILD GALLERY */
const gallery = document.getElementById("gallery");
images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "photo";
    img.onclick = () => openLightbox(i);
    gallery.appendChild(img);
});

/* SPLASH */
function startExperience() {
    const splash = document.getElementById("splashScreen");
    const main = document.getElementById("mainContent");

    document.getElementById("alertSound").play().catch(()=>{});

    main.style.display = "block";
    splash.style.display = "none";
}

/* MUSIC */
function reveal() {
    const music = document.getElementById("bgMusic");
    music.currentTime = 15;
    music.play().catch(()=>{});
}

/* LIGHTBOX */
function openLightbox(i) {
    currentIndex = i;
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightboxImg").src = images[i];
}

function nextImage(e) {
    e.stopPropagation();
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("lightboxImg").src = images[currentIndex];
}

function prevImage(e) {
    e.stopPropagation();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("lightboxImg").src = images[currentIndex];
}

document.getElementById("lightbox").onclick = () => {
    document.getElementById("lightbox").style.display = "none";
};

/* FINAL */
function startFinal() {
    document.getElementById("finalScreen").style.display = "flex";
}

function closeFinal() {
    document.getElementById("finalScreen").style.display = "none";
}

</script>

</body>
</html>
