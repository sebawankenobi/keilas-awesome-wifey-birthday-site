<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    color: white;
    text-align: center;
}

/* SPLASH */
#splashScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
}

/* MAIN */
#mainContent { display: none; }

.container { 
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
}

button {
    background-color: #ffb703;
    color: #240046;
    border: none;
    padding: 15px 25px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Comic Sans MS', cursive;
}

/* GALLERY */
.gallery {
    display: none;
    margin-top: 10px;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    min-height: 200px;
}

.gallery.show {
    display: flex;
}

.photo {
    width: clamp(140px, 35vw, 240px);
    height: clamp(140px, 35vw, 240px);
    object-fit: cover;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

.photo.visible {
    opacity: 1;
    transform: translateY(0);
}

/* FINAL BUTTON (hidden initially) */
#finalBtn {
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.5s ease;
}

#finalBtn.show {
    opacity: 1;
    pointer-events: auto;
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(10,0,20,0.95);
    display: none;
    justify-content: center;
    align-items: center;
}

#finalContent {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#backBtn { margin-top: 40px; }

.cursor { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }

</style>
</head>

<body>

<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<div id="mainContent">
<div class="container">

<h1>Down the Rabbit Hole 🐇</h1>
<h2>It’s Your Birthday 💜</h2>

<button onclick="reveal()">Do NOT Click This 👀</button>

<div class="gallery" id="gallery"></div>

<button id="finalBtn" onclick="startFinal()">One Last Thing 💜</button>

</div>
</div>

<div id="finalScreen" onclick="closeFinal(event)">
<div id="finalContent">
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<audio id="bgMusic" src="audio/song.mp3"></audio>

<script>

function startExperience(){
    document.getElementById("splashScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
}

const images = [
"images/20190801_163558.jpg",
"images/20190823_171856.jpg",
"images/20200912_201834.jpg",
"images/20230409_090603.jpg",
"images/20230423_144323.jpg",
"images/FB_IMG_1557711830326.jpg",
"images/FB_IMG_1566611458309.jpg",
"images/FB_IMG_1587683608211.jpg",
"images/FB_IMG_1776693720360.jpg",
"images/FB_IMG_1776885598001.jpg",
"images/FB_IMG_1776885609789.jpg",
"images/FB_IMG_1776885622286.jpg",
"images/FB_IMG_1776885629939.jpg",
"images/FB_IMG_1776885639302.jpg",
"images/IMG-20191223-WA0015.jpg",
"images/IMG-20210325-WA0000.jpg",
"images/IMG-20210423-WA0001.jpg",
"images/IMG-20210423-WA0018.jpg",
"images/IMG-20210423-WA0020.jpg",
"images/IMG-20210423-WA0037.jpg",
"images/IMG-20210423-WA0038.jpg",
"images/IMG-20230906-WA0000.jpg",
"images/IMG-20251122-WA0003.jpg",
"images/IMG-20251122-WA0004.jpg",
"images/IMG_20230920_103736_268.jpg"
];

const gallery = document.getElementById("gallery");
const finalBtn = document.getElementById("finalBtn");

function reveal(){

    gallery.classList.add("show");

    images.forEach((src, i) => {

        const img = document.createElement("img");
        img.src = src;
        img.className = "photo";
        gallery.appendChild(img);

        requestAnimationFrame(() => {
            setTimeout(() => {
                img.classList.add("visible");
            }, i * 120);
        });

    });

    // 🎯 Smooth scroll into memories
    setTimeout(() => {
        gallery.scrollIntoView({ behavior: "smooth" });
    }, 300);

    // 🎯 Reveal final button AFTER all photos animate
    const totalDuration = images.length * 120 + 800;

    setTimeout(() => {
        finalBtn.classList.add("show");
    }, totalDuration);

    const music = document.getElementById("bgMusic");
    try {
        music.currentTime = 15;
        music.play();
    } catch(e){}
}

function startFinal(){
    document.getElementById("finalScreen").style.display="flex";

    const text="Out of all the strange, random, beautiful things...\n\nI’m just really glad I found you 💜";
    const el=document.getElementById("typewriter");

    el.innerHTML="";
    let i=0;

    function type(){
        if(i<text.length){
            el.innerHTML+=text[i]==="\n"?"<br>":text[i];
            i++;
            setTimeout(type,40);
        }
    }

    type();
}

function closeFinal(e){
    e.stopPropagation();
    document.getElementById("finalScreen").style.display="none";
}

</script>

</body>
</html>
