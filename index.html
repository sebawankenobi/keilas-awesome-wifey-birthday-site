<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>
html {
    background: radial-gradient(circle at top, #7b2cbf, #240046);
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Quicksand', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* FLOATING */
.floating {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    animation: float 8s ease-in-out infinite;
    opacity: 0.7;
}

.f1 { left: 10%; top: 20%; }
.f2 { left: 80%; top: 30%; animation-delay: 2s; }
.f3 { left: 50%; top: 10%; animation-delay: 4s; }

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
    100% { transform: translateY(0); }
}

/* SPLASH */
#splashScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
}

#mainContent { display: none; }

.container { padding: 60px 20px; }

button {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    background-color: #ffb703;
    color: #240046;
    border: none;
    padding: 16px 30px;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
}

/* SLIDESHOW */
#slideshow {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#slideshow.active { display: flex; }

.slide img {
    max-width: 92%;
    max-height: 65vh;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 1s ease;
}

.slide.show img { opacity: 1; }

#caption {
    margin-top: 20px;
    font-size: 1.4rem;
    max-width: 85%;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

#caption.show {
    opacity: 1;
    transform: translateY(0);
}

#tapHint {
    margin-top: 10px;
    opacity: 0.7;
    display: none;
}

#finalBtn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 1500;
}

#finalBtn.show { display: block; }

#finalScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #240046, #000);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}

#typewriter {
    font-size: 1.6rem;
    max-width: 90%;
}

.emphasis {
    font-weight: 700;
    text-shadow: 0 0 12px rgba(255,255,255,0.4);
}

#backBtn { margin-top: 60px; }

</style>
</head>

<body>

<div class="floating f1">🌼</div>
<div class="floating f2">🌀</div>
<div class="floating f3">💜</div>

<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<div id="mainContent">
<div class="container">

<h1>It’s Time To Go Down The Rabbit Hole! 🐇</h1>
<h2>It’s Your Birthday! 💜</h2>

<button id="startBtn" onclick="handleWarning()">WARNING - DON'T CLICK ON THIS!!</button>

</div>
</div>

<div id="slideshow" onclick="nextSlide()">
<div id="slideWrapper"></div>
<div id="caption"></div>
<div id="tapHint">(tap the photo 💜)</div>
</div>

<button id="finalBtn" onclick="startFinal()">Oh, And One Last Thing.... 💜</button>

<div id="finalScreen" onclick="closeFinal(event)">
<div>
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<audio id="bgMusic" src="audio/song.mp3"></audio>

<script>

function startExperience(){
    splashScreen.style.display="none";
    mainContent.style.display="block";
}

let warningStep=0;
function handleWarning(){
    warningStep++;
    if(warningStep===1) startBtn.innerText="ARE YOU SURE!";
    else if(warningStep===2) startBtn.innerText="DON'T SAY I DIDN'T WARN YOU!!!";
    else startSlideshow();
}

const slides = [
{src:"images_new/1.jpg",text:"It's your birthday, silly!!"},
{src:"images_new/2.jpg",text:"Did I mention you're silly?!"},
{src:"images_new/3.jpg",text:"Legend says, that way back..."},
{src:"images_new/4.jpg",text:"when we were being silly on dates...."},
{src:"images_new/5.jpg",text:"and smiling...."},
{src:"images_new/6.jpg",text:"our love bloomed...."},
{src:"images_new/7.jpg",text:"My heart and soul always knew I wanted to spend the rest of my life with you."},
{src:"images_new/8.jpg",text:"I admire you."},
{src:"images_new/9.jpg",text:"With every triumph."},
{src:"images_new/10.jpg",text:"And every victory."},
{src:"images_new/11.jpg",text:"Your smile shines with light...."},
{src:"images_new/12.jpg",text:"With so much happiness...."},
{src:"images_new/13.jpg",text:"And your silliness, of course!"},
{src:"images_new/14.jpg",text:"You support us!"},
{src:"images_new/15.jpg",text:"You're so quirky!!"},
{src:"images_new/16.jpg",text:"Even if you're blonde..."},
{src:"images_new/17.jpg",text:"Blonde AND silly!!"},
{src:"images_new/18.jpg",text:"Time has proven that we're meant for each other."},
{src:"images_new/19.jpg",text:"You're a beautiful badass...."},
{src:"images_new/20.jpg",text:"A PROFESSIONAL beautiful, badass!!"},
{src:"images_new/21.jpg",text:"And I'm so fucking lucky that you're in my life."},
{src:"images_new/22.jpg",text:"Yes, YOU!"},
{src:"images_new/23.jpg",text:"*insert laugh track here*"}
];

let currentIndex=0;

function startSlideshow(){
    mainContent.style.display="none";
    slideshow.classList.add("active");
    tapHint.style.display="block";

    bgMusic.currentTime=15;
    bgMusic.play();

    showSlide();
}

function showSlide(){
    const s=slides[currentIndex];

    slideWrapper.innerHTML=`<div class="slide show"><img src="${s.src}"></div>`;

    caption.classList.remove("show");
    caption.innerHTML="";

    setTimeout(()=>{
        caption.innerHTML=s.text;
        caption.classList.add("show");
    },500);
}

function nextSlide(){
    currentIndex++;

    if(currentIndex>=slides.length){
        slideshow.classList.remove("active");
        finalBtn.classList.add("show");
        return;
    }

    showSlide();
}

function startFinal(){
    finalScreen.style.display="flex";

    const el = typewriter;
    el.innerHTML="";

    const parts = [
        { text: "Out of all the strange, random, beautiful things in the Universe....\n\n", speed: 45 },
        { text: "I'm just really glad I found you....\n\n", speed: 45 },
        { text: "just the way you are....\n\n", speed: 95, bold: true },
        { text: "Happy Birthday, moon of my life 💜💜💜", speed: 45 }
    ];

    let partIndex = 0;
    let charIndex = 0;

    function type(){
        if(partIndex >= parts.length) return;

        let part = parts[partIndex];

        if(charIndex === 0){
            const span = document.createElement("span");
            if(part.bold) span.className = "emphasis";
            el.appendChild(span);
        }

        const currentSpan = el.lastChild;

        if(charIndex < part.text.length){
            const char = part.text[charIndex];
            currentSpan.innerHTML += (char === "\n") ? "<br>" : char;
            charIndex++;

            let delay = part.speed + Math.random()*30;
            if(char === ".") delay += 150;

            setTimeout(type, delay);

        } else {
            partIndex++;
            charIndex = 0;
            setTimeout(type, 300);
        }
    }

    setTimeout(type, 400);
}

function closeFinal(e){
    e.stopPropagation();
    finalScreen.style.display="none";
}

</script>

</body>
</html>
