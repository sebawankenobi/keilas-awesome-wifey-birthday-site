<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<style>
body {
    margin:0;
    font-family:'Comic Sans MS',cursive;
    background: radial-gradient(circle at top,#7b2cbf,#240046);
    color:white;
    text-align:center;
}

/* SPLASH */
#splashScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
    cursor:pointer;
    transition:opacity .8s;
}

/* MAIN */
#mainContent{display:none;}

.container{padding:60px 20px;}

/* GALLERY */
.gallery{
    margin-top:40px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    opacity:0;
    transition:opacity 2s;
}

.photo{
    width:clamp(140px,35vw,240px);
    height:clamp(140px,35vw,240px);
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
}

/* MEMORY TEXT */
#memoryText{
    margin-top:20px;
    padding:10px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    display:none;
}

/* LIGHTBOX */
#lightbox{
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

#lightbox img{
    max-width:90%;
    max-height:80%;
    border-radius:15px;
}

.navBtn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:2rem;
    background:rgba(255,255,255,0.2);
    border:none;
    color:white;
    padding:10px;
}

#prevBtn{left:20px;}
#nextBtn{right:20px;}

/* FINAL */
#finalScreen{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.95);
}

#backBtn{
    margin-top:20px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<!-- MAIN -->
<div id="mainContent">

<div class="container">

<h1>Down the Rabbit Hole 🐇</h1>

<button onclick="reveal()">Do NOT Click This 👀</button>

<div class="gallery" id="gallery"></div>
<div id="memoryText"></div>

<button onclick="startFinal()">One Last Thing 💜</button>

</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<button class="navBtn" id="prevBtn" onclick="prevImage(event)">❮</button>
<img id="lightboxImg">
<button class="navBtn" id="nextBtn" onclick="nextImage(event)">❯</button>
</div>

<!-- FINAL -->
<div id="finalScreen" onclick="closeFinal(event)">
<div>
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="audio/song.mp3"></audio>
<audio id="alertSound" src="audio/alert.mp3"></audio>

<script>

/* DATA */
const images=[
"images/20190801_163558.jpg",
"images/20190823_171856.jpg"
];

const memories=[
"Back when everything started 💜",
"This day still lives in my head"
];

let currentIndex=0;

/* BUILD GALLERY */
const gallery=document.getElementById("gallery");
images.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;
    img.className="photo";
    img.onclick=()=>openLightbox(i);
    gallery.appendChild(img);
});

/* SPLASH */
function startExperience(){
    const splash=document.getElementById("splashScreen");
    const main=document.getElementById("mainContent");
    const alert=document.getElementById("alertSound");

    alert.currentTime=0;
    alert.play().catch(()=>{});

    main.style.display="block";

    splash.style.opacity="0";
    setTimeout(()=>{splash.style.display="none";},800);
}

/* REVEAL */
function reveal(){
    document.querySelector(".gallery").style.opacity="1";

    const music=document.getElementById("bgMusic");
    music.currentTime=15;
    music.play();

    showMemory(0);
}

/* LIGHTBOX */
function openLightbox(i){
    currentIndex=i;
    document.getElementById("lightbox").style.display="flex";
    updateLightbox();
}

function updateLightbox(){
    document.getElementById("lightboxImg").src=images[currentIndex];
    showMemory(currentIndex);
}

function nextImage(e){
    e.stopPropagation();
    currentIndex=(currentIndex+1)%images.length;
    updateLightbox();
}

function prevImage(e){
    e.stopPropagation();
    currentIndex=(currentIndex-1+images.length)%images.length;
    updateLightbox();
}

document.getElementById("lightbox").onclick=()=>{
    document.getElementById("lightbox").style.display="none";
};

/* MEMORY */
function showMemory(i){
    const box=document.getElementById("memoryText");
    box.innerHTML=memories[i];
    box.style.display="block";
}

/* FINAL */
function startFinal(){
    document.getElementById("finalScreen").style.display="flex";

    const text="Out of all the strange things...\n\nI'm just glad I found you 💜";
    const el=document.getElementById("typewriter");

    el.innerHTML="";
    let i=0;

    function type(){
        if(i<text.length){
            el.innerHTML+=text[i]==="\n"?"<br>":text[i];
            i++;
            setTimeout(type,40);
        }
    }

    type();
}

function closeFinal(e){
    e.stopPropagation();
    document.getElementById("finalScreen").style.display="none";
}

</script>

</body>
</html>
