<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<style>
body {
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    color: white;
    text-align: center;
}

/* SPLASH */
#splashScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
    transition: opacity 0.8s ease;
}

#mainContent {
    display: none;
}

/* FLOATING */
.floating {
    position: absolute;
    font-size: 2rem;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    50% { transform: translateY(-40px); }
}

/* GALLERY */
.gallery {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    opacity: 0;
    transition: opacity 2s;
}

.photo {
    width: clamp(140px, 35vw, 220px);
    height: clamp(140px, 35vw, 220px);
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    top:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

#lightbox img {
    max-width:90%;
    max-height:80%;
    border-radius:15px;
}

/* FINAL */
#finalScreen {
    position: fixed;
    top:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splashScreen" onclick="startExperience()">
    <h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<!-- MAIN -->
<div id="mainContent">

<div class="container">

<h1>Down the Rabbit Hole 🐇</h1>

<button onclick="reveal()">Do NOT Click This 👀</button>

<div class="gallery" id="gallery"></div>

<button onclick="startFinal()">One Last Thing 💜</button>

</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg">
</div>

<!-- FINAL -->
<div id="finalScreen" onclick="closeFinal()">
    <div id="typewriter"></div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="audio/song.mp3"></audio>
<audio id="alertSound" src="audio/alert.mp3"></audio>

<script>

/* DATA */
const images = [
"images/20190801_163558.jpg",
"images/20190823_171856.jpg"
];

const gallery = document.getElementById("gallery");

/* BUILD GALLERY */
images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "photo";
    img.onclick = () => openLightbox(i);
    gallery.appendChild(img);
});

/* SPLASH FIX */
function startExperience() {
    const splash = document.getElementById("splashScreen");
    const main = document.getElementById("mainContent");
    const alert = document.getElementById("alertSound");

    // PLAY SOUND
    alert.currentTime = 0;
    alert.play().catch(()=>{});

    // SHOW CONTENT FIRST (KEY FIX)
    main.style.display = "block";

    // FADE OUT SPLASH
    splash.style.opacity = "0";

    setTimeout(() => {
        splash.style.display = "none";
    }, 800);
}

/* MUSIC */
function reveal() {
    document.querySelector(".gallery").style.opacity = "1";

    const music = document.getElementById("bgMusic");
    music.currentTime = 15;
    music.play();
}

/* LIGHTBOX */
function openLightbox(i) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightboxImg").src = images[i];
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

/* FINAL */
function startFinal() {
    document.getElementById("finalScreen").style.display = "flex";
}

function closeFinal() {
    document.getElementById("finalScreen").style.display = "none";
}

</script>

</body>
</html>
