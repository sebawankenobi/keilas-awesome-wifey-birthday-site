<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Curious Birthday 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: radial-gradient(circle at top, #7b2cbf, #240046);
    color: white;
    text-align: center;
    font-size: 18px;
}

h1, h2, #caption, #typewriter {
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

#splashScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top, #240046, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    cursor: pointer;
}

#mainContent { display: none; }

.container { padding: 60px 20px; }

button {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    background-color: #ffb703;
    color: #240046;
    border: none;
    padding: 16px 30px;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
}

/* slideshow */
#slideshow { display:none; margin-top:40px; cursor:pointer; }
.slide img { max-width:92%; max-height:65vh; border-radius:20px; opacity:0; transition:opacity 1s ease; }
.slide.show img { opacity:1; }

#caption {
    margin-top:25px;
    font-size:1.4rem;
    max-width:85%;
    margin-left:auto;
    margin-right:auto;
    opacity:0;
    transition:0.6s;
}
#caption.show { opacity:1; }

#tapHint { margin-top:15px; opacity:0.7; }

#finalBtn {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    display:none;
}
#finalBtn.show { display:block; opacity:1; }

#finalScreen {
    position:fixed;
    top:0;
    width:100%;
    height:100%;
    background:rgba(10,0,20,0.95);
    display:none;
    justify-content:center;
    align-items:center;
}

#typewriter {
    font-size:1.6rem;
    max-width:90%;
}

#backBtn { margin-top:60px; }

</style>
</head>

<body>

<div id="splashScreen" onclick="startExperience()">
<h1>Oh no, what might this surprise be?! 👀</h1>
</div>

<div id="mainContent">
<div class="container">

<h1>It’s Time To Go Down The Rabbit Hole! 🐇</h1>
<h2>It’s Your Birthday! 💜</h2>

<button id="startBtn" onclick="handleWarning()">WARNING - DON'T CLICK ON THIS!!</button>

<div id="slideshow" onclick="nextSlide()"></div>
<div id="caption"></div>
<div id="tapHint" style="display:none;">(tap the photo 💜)</div>

</div>
</div>

<button id="finalBtn" onclick="startFinal()">Oh, And One Last Thing.... 💜</button>

<div id="finalScreen" onclick="closeFinal(event)">
<div>
<div id="typewriter"></div>
<button id="backBtn" onclick="closeFinal(event)">← Back</button>
</div>
</div>

<audio id="bgMusic" src="audio/song.mp3"></audio>

<script>

function startExperience(){
    splashScreen.style.display="none";
    mainContent.style.display="block";
}

let warningStep=0;
function handleWarning(){
    const btn=startBtn;
    warningStep++;
    if(warningStep===1) btn.innerText="ARE YOU SURE!";
    else if(warningStep===2) btn.innerText="DON'T SAY I DIDN'T WARN YOU!!!";
    else startSlideshow();
}

const slides = [
{src:"images_new/1.jpg",text:"It's your birthday, silly!!"},
{src:"images_new/2.jpg",text:"Did I mention you're silly?!"},
{src:"images_new/3.jpg",text:"Legend says, that way back..."},
{src:"images_new/4.jpg",text:"when we were being silly on dates...."},
{src:"images_new/5.jpg",text:"and smiling...."},
{src:"images_new/6.jpg",text:"our love bloomed...."},
{src:"images_new/7.jpg",text:"My heart and soul always knew I wanted to spend the rest of my life with you."},
{src:"images_new/8.jpg",text:"I admire you."},
{src:"images_new/9.jpg",text:"With every triumph."},
{src:"images_new/10.jpg",text:"And every victory."},
{src:"images_new/11.jpg",text:"Your smile shines with light...."},
{src:"images_new/12.jpg",text:"With so much happiness...."},
{src:"images_new/13.jpg",text:"And your silliness, of course!"},
{src:"images_new/14.jpg",text:"You support us!"},
{src:"images_new/15.jpg",text:"You're so quirky!!"},
{src:"images_new/16.jpg",text:"Even if you're blonde..."},
{src:"images_new/17.jpg",text:"Blonde AND silly!!"},
{src:"images_new/18.jpg",text:"Time has proven that we're meant for each other."},
{src:"images_new/19.jpg",text:"You're a beautiful badass...."},
{src:"images_new/20.jpg",text:"A PROFESSIONAL beautiful, badass!!"},
{src:"images_new/21.jpg",text:"And I'm so fucking lucky that you're in my life."},
{src:"images_new/22.jpg",text:"Yes, YOU!"},
{src:"images_new/23.jpg",text:"*insert laugh track here*"}
];

let currentIndex=0;

function startSlideshow(){
    startBtn.style.display="none";
    slideshow.style.display="block";
    tapHint.style.display="block";

    bgMusic.currentTime=15;
    bgMusic.play();

    showSlide();
}

function showSlide(){
    const s=slides[currentIndex];
    slideshow.innerHTML=`<div class="slide show"><img src="${s.src}"></div>`;
    caption.classList.remove("show");
    caption.innerHTML="";
    setTimeout(()=>{caption.innerHTML=s.text;caption.classList.add("show");},600);
}

function nextSlide(){
    currentIndex++;
    if(currentIndex>=slides.length){
        slideshow.style.display="none";
        caption.style.display="none";
        tapHint.style.display="none";
        finalBtn.classList.add("show");
        return;
    }
    showSlide();
}

/* FINAL TYPEWRITER */
function startFinal(){
    finalScreen.style.display="flex";

    const lines = [
        "Out of all the strange, random, beautiful things in the Universe....",
        "",
        "I'm just really glad I found you....",
        "",
        "just the way you are....", // 🔥 bold line
        "",
        "Happy Birthday, moon of my life 💜💜💜"
    ];

    const el = typewriter;
    el.innerHTML="";
    let lineIndex=0;
    let charIndex=0;

    function type(){

        if(lineIndex>=lines.length) return;

        let currentLine = lines[lineIndex];

        // 🔥 make THIS line bold
        if(lineIndex === 4){
            el.innerHTML += "<strong>";
        }

        if(charIndex < currentLine.length){
            el.innerHTML += currentLine[charIndex];
            charIndex++;

            let delay = 45 + Math.random()*30;

            // slower for bold line
            if(lineIndex === 4) delay += 60;

            if(currentLine[charIndex-1]===".") delay+=150;

            setTimeout(type, delay);
        } else {
            if(lineIndex === 4){
                el.innerHTML += "</strong>";
            }

            el.innerHTML += "<br>";
            lineIndex++;
            charIndex=0;

            setTimeout(type, 300);
        }
    }

    setTimeout(type,400);
}

function closeFinal(e){
    e.stopPropagation();
    finalScreen.style.display="none";
}

</script>

</body>
</html>
